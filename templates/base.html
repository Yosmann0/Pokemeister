<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Welcome to Pokemeister</title>
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                background: #f7f8fc;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                color: #2b2b33;
            }

            .topbar {
                position: sticky;
                top: 0;
                z-index: 10;
                background: linear-gradient(135deg, #5a6bc4, #8fa6d6);
                box-shadow: 0 4px 14px rgba(20, 20, 40, 0.15);
            }

            .topbar-inner {
                max-width: 960px;
                margin: 0 auto;
                padding: 14px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 12px;
            }

            .brand {
                display: flex;
                align-items: center;
                gap: 8px;
                color: #fff;
                text-decoration: none;
                font-weight: 800;
                font-size: 1.15rem;
                letter-spacing: 0.3px;
            }

            .brand-icon {
                width: 26px;
                height: 26px;
                border-radius: 50%;
                background: #fff;
                border: 3px solid #2b2b33;
                position: relative;
                flex: none;
            }

            .brand-icon::before {
                content: "";
                position: absolute;
                left: -3px;
                right: -3px;
                top: 50%;
                height: 3px;
                background: #2b2b33;
                transform: translateY(-50%);
            }

            .brand-icon::after {
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 8px;
                height: 8px;
                background: #fff;
                border: 2px solid #2b2b33;
                border-radius: 50%;
                transform: translate(-50%, -50%);
            }

            .nav-links {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
            }

            .nav-links a {
                color: rgba(255, 255, 255, 0.92);
                text-decoration: none;
                font-size: 0.88rem;
                font-weight: 600;
                padding: 8px 16px;
                border-radius: 999px;
                transition: background 0.15s ease, color 0.15s ease;
                white-space: nowrap;
            }

            .nav-links a:hover {
                background: rgba(255, 255, 255, 0.18);
                color: #fff;
            }

            .nav-links a.active {
                background: #fff;
                color: #5a6bc4;
            }

            main {
                min-height: calc(100vh - 60px);
            }
        </style>
    </head>
    <body>
        <header class="topbar">
            <div class="topbar-inner">
                <a class="brand" href="/index">
                    <span class="brand-icon"></span>
                    Pokemeister
                </a>
                <nav class="nav-links">
                    <a href="/index">Home</a>
                    <a href="/selection">Random Pokemon Selector</a>
                </nav>
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
